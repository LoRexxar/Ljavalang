name: Tests

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run tests
        run: |
          python -m pytest javalang/test/ -v --tb=short \
            --ignore=javalang/test/test_java_8_syntax.py \
            --ignore=javalang/test/test_package_declaration.py

      - name: Run legacy tests (best-effort)
        continue-on-error: true
        run: |
          pip install setuptools  # provides pkg_resources for legacy tests
          python -m pytest javalang/test/test_java_8_syntax.py \
            javalang/test/test_package_declaration.py -v --tb=short
